<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 8 – Link Shrinker</title>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/react-router-dom@5.3.0/umd/react-router-dom.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar {
            background: #7b5050;
            display: flex;
            align-items: center;
            padding: 0 12px;
        }
        .navbar a {
            color: #fff;
            text-decoration: none;
            padding: 12px 14px;
            display: inline-block;
            font-size: 0.95rem;
        }
        .navbar a:hover { background: rgba(0,0,0,0.2); }
        .navbar .spacer { flex: 1; }
        .navbar .next-lab {
            font-size: 0.9rem;
            background: rgba(0,0,0,0.25);
            border-radius: 4px;
            padding: 6px 12px !important;
            margin: 0 4px;
        }

        /* ── Card ── */
        .card {
            max-width: 860px;
            margin: 48px auto;
            background: #fff;
            padding: 36px 44px;
            border-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 28px;
        }

        h2 {
            font-size: 1.15rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 1rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            margin-bottom: 18px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #1a73e8; }

        .btn-row {
            text-align: center;
            margin-bottom: 28px;
        }

        .btn-shorten {
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 30px;
            font-size: 1rem;
            cursor: pointer;
        }
        .btn-shorten:hover { background: #1558b0; }

        .result-box {
            background: #f0f0f0;
            text-align: center;
            padding: 14px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
            word-break: break-all;
        }

        .about-text { margin-top: 14px; line-height: 1.7; font-size: 1rem; }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { HashRouter, Route, Switch, Link } = ReactRouterDOM;

        function Navbar() {
            return (
                <nav className="navbar">
                    <Link to="/">Home</Link>
                    <Link to="/about">About us</Link>
                    <span className="spacer" />
                    <a className="next-lab" href="../Lab-9/Lab-9.html">Lab 9 →</a>
                </nav>
            );
        }

        function Home() {
            const [longUrl, setLongUrl] = React.useState("");
            const [shortCode, setShortCode] = React.useState("");
            const [result, setResult] = React.useState("");

            function handleShorten() {
                if (!longUrl.trim()) return;
                const code = shortCode.trim() || Math.random().toString(36).slice(2, 8);
                setResult(`https://cpt405.co/${code}`);
            }

            return (
                <div className="card">
                    <h1>Link Shrinker</h1>

                    <label>Long URL:</label>
                    <input
                        type="text"
                        placeholder="https://example.com/very/long/url"
                        value={longUrl}
                        onChange={e => setLongUrl(e.target.value)}
                    />

                    <label>Enter short code:</label>
                    <input
                        type="text"
                        placeholder="e.g. react101"
                        value={shortCode}
                        onChange={e => setShortCode(e.target.value)}
                    />

                    <div className="btn-row">
                        <button className="btn-shorten" onClick={handleShorten}>Shorten</button>
                    </div>

                    {result && (
                        <>
                            <h2>Short URL</h2>
                            <div className="result-box">{result}</div>
                        </>
                    )}
                </div>
            );
        }

        function About() {
            return (
                <div className="card">
                    <h1>About Us</h1>
                    <p className="about-text">
                        Link Shrinker is a simple URL shortening service built with React.js for CPIT-405 Lab 8.
                    </p>
                    <p className="about-text">
                        It demonstrates React fundamentals: state management with <strong>useState</strong>,
                        event handling, and client-side routing with <strong>React Router</strong>.
                    </p>
                </div>
            );
        }

        function App() {
            return (
                <HashRouter>
                    <Navbar />
                    <Switch>
                        <Route exact path="/" component={Home} />
                        <Route path="/about" component={About} />
                    </Switch>
                </HashRouter>
            );
        }

        ReactDOM.render(<App />, document.getElementById("root"));
    </script>
</body>

</html>
