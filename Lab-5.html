<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBA Player Stats Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="page">
      <header class="header">
        <h1 class="title">NBA Player Stats Dashboard</h1>
        <button id="dark-mode-toggle" class="btn">Toggle Dark Mode</button>
      </header>

      <section class="controls">
        <input id="search" class="input" type="text" placeholder="Search players..." />
        <select id="team-filter" class="select">
          <option value="all">All</option>
        </select>
      </section>

      <section class="table-wrap">
        <table id="player-stats" class="table">
          <thead>
            <tr>
              <th class="th" data-sort="name">Name</th>
              <th class="th" data-sort="team">Team</th>
              <th class="th" data-sort="points">Points</th>
              <th class="th" data-sort="rebounds">Rebounds</th>
              <th class="th" data-sort="assists">Assists</th>
            </tr>
          </thead>
          <tbody id="player-rows"></tbody>
        </table>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
