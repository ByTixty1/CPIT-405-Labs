<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Great Auto Parts - Order Form</title>
  <link rel="stylesheet" href="Lab-4.css" />
</head>
<body>
  <div class="wrapper">
    <h1>Great Auto Parts - Order Form</h1>

    <form class="order-form" action="#" method="post">
      <label for="firstName">First Name:</label>
      <input id="firstName" name="firstName" type="text" placeholder="Enter your first name" required />

      <label for="lastName">Last Name:</label>
      <input id="lastName" name="lastName" type="text" placeholder="Enter your last name" required />

      <label for="email">Email:</label>
      <input id="email" name="email" type="email" placeholder="Enter your email address" required />

      <label for="phone">Phone number:</label>
      <input id="phone" name="phone" type="tel" placeholder="Enter your phone number" required />

      <label for="make">Make:</label>
      <input id="make" name="make" type="text" placeholder="Make" />

      <label for="model">Model:</label>
      <input id="model" name="model" type="text" placeholder="Model" />

      <label for="year">Year:</label>
      <input id="year" name="year" type="number" placeholder="Year" min="1900" max="2100" step="1" />

      <label for="date">Date:</label>
      <input id="date" name="date" type="date" />

      <label for="sparePart">Spare Part:</label>
      <input id="sparePart" name="sparePart" type="text" placeholder="Enter the spare part you need" required />

      <label for="quantity">Quantity:</label>
      <input id="quantity" name="quantity" type="number" placeholder="Enter the quantity of the spare part you need" min="1" step="1" required />

      <label for="comment">Comment:</label>
      <textarea id="comment" name="comment" placeholder="Enter your comment"></textarea>

      <button type="submit" class="submit-btn">Submit</button>
    </form>
  </div>
    <a href="Lab-5.html">Go to Lab 5
</body>

</html>
