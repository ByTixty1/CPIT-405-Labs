<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 6</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <h1>Lab 6</h1>
    <h2>Like or dislike</h2>

    <div class="vote-row">
        <button id="like-btn" class="vote-btn">👍<span id="like-count">0</span></button>
        <button id="dislike-btn" class="vote-btn">👎<span id="dislike-count">0</span></button>
    </div>

    <h2>Comments</h2>
    <textarea id="comment-input" placeholder="Write a comment..." rows="6"></textarea>

    <div id="comments-container"></div>

    <div class="btn-row">
        <button id="comment-submit" class="action-btn">Submit</button>
        <button id="reset-btn" class="action-btn">Clear</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
